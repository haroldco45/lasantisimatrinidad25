    .hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,3,3,.1) 0%,rgba(10,3,3,.5) 60%,rgba(10,3,3,1) 100%);}
    .hero-c{position:relative;z-index:2;text-align:center;padding:0 24px;max-width:600px;}
    .orn{color:var(--gold);font-size:22px;letter-spacing:12px;opacity:.7;margin-bottom:8px;}
    .eyebrow{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:13px;color:var(--gold-light);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;opacity:.85;}
    h1{font-family:"Cinzel Decorative",serif;font-size:clamp(18px,5vw,28px);color:var(--gold);line-height:1.3;margin-bottom:8px;text-shadow:0 2px 16px rgba(0,0,0,.9);}
    .loc{font-family:"Cinzel Decorative",serif;font-size:clamp(10px,2.8vw,13px);color:var(--gold-light);letter-spacing:.2em;opacity:.8;margin-bottom:16px;}
    .hdiv{width:100px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto;}
    .hdate{font-family:"EB Garamond",serif;font-size:clamp(14px,3.8vw,18px);color:var(--cream);letter-spacing:.1em;}
    .bishop{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:clamp(11px,3vw,13px);color:var(--gold-light);opacity:.75;margin-top:5px;}

    /* SCROLL CUE */
    .scroll-cue{
      position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
      z-index:3;text-align:center;
      animation:bob 2s ease-in-out infinite;
    }
    .scroll-cue span{display:block;font-size:10px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;opacity:.7;margin-bottom:2px;}
    .scroll-cue i{color:var(--gold);font-size:22px;font-style:normal;opacity:.8;}
    @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(5px);}}

    /* SECTIONS */
    .gallery{background:var(--dark);padding:48px 0 32px;}
    .inner{max-width:660px;margin:0 auto;padding:0 18px;}
    .slabel{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:12px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;text-align:center;margin-bottom:8px;opacity:.7;}
    .stitle{font-family:"Cinzel Decorative",serif;font-size:clamp(15px,4vw,20px);color:var(--gold);text-align:center;line-height:1.4;margin-bottom:6px;}
    .sorn{text-align:center;color:var(--gold);font-size:14px;letter-spacing:10px;margin:10px 0 20px;opacity:.5;}

    .card{background:#120404;border:1px solid rgba(201,168,76,.2);border-radius:2px;overflow:hidden;margin-bottom:22px;box-shadow:0 6px 30px rgba(0,0,0,.5);}
    .card img{width:100%;display:block;}
    .cap{padding:14px 18px;border-top:1px solid rgba(201,168,76,.12);}
    .cap h3{font-family:"Cinzel Decorative",serif;font-size:clamp(11px,3.2vw,13px);color:var(--gold);margin-bottom:4px;}
    .cap p{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:clamp(13px,3.5vw,15px);color:var(--gold-light);line-height:1.55;opacity:.8;}

    .plaq-sec{background:#0a0202;padding:48px 18px;}
